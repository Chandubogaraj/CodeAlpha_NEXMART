<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXMART — Premium Shopping</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="mainNav">
    <div class="nav-inner">
      <a href="#" class="logo" onclick="navigate('home')">NEX<span>MART</span></a>
      <div class="nav-search">
        <input type="text" id="searchInput" placeholder="Search products…" oninput="handleSearch(this.value)" />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="nav-links">
        <a href="#" onclick="navigate('products')" class="nav-link">Shop</a>
        <a href="#" onclick="navigate('orders')" class="nav-link" id="ordersLink" style="display:none">Orders</a>
        <a href="#" onclick="navigate('auth')" class="nav-link" id="authLink">Login</a>
        <a href="#" onclick="handleLogout()" class="nav-link" id="logoutLink" style="display:none">Logout</a>
        <button class="cart-btn" onclick="navigate('cart')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- PAGES -->
  <main id="app"></main>

  <script src="js/app.js"></script>
</body>
</html>
